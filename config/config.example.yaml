# Polymarket Oracle Configuration
# Copy this to config.yaml and fill in your credentials
# NEVER commit config.yaml to git

polymarket:
  # Your Polygon wallet private key (without 0x prefix)
  # Generate one or export from MetaMask
  private_key: "YOUR_PRIVATE_KEY_HERE"

  # Your Polymarket proxy wallet address
  # Find this in Polymarket UI -> Profile dropdown
  funder_address: "0xYOUR_FUNDER_ADDRESS_HERE"

  # Optional: pre-created CLOB L2 API credentials.
  # Leave blank to derive credentials from private_key at startup.
  clob_api_key: ""
  clob_api_secret: ""
  clob_api_passphrase: ""

  # Signature type: 0=EOA, 1=Magic/email wallet, 2=Gnosis Safe
  signature_type: 1

  # API endpoints (don't change unless Polymarket migrates)
  clob_url: "https://clob.polymarket.com"
  gamma_url: "https://gamma-api.polymarket.com"
  chain_id: 137
  tick_size: "0.01"
  order_type: "FOK"
  reconcile_fills: true

anthropic:
  # Your Anthropic API key for probability assessment
  api_key: "YOUR_ANTHROPIC_API_KEY_HERE"

  # Model to use for probability assessment
  model: "claude-sonnet-4-6"

  # Max tokens per assessment call
  max_tokens: 1024

  # Keep false to reduce anchoring when asking for independent probabilities.
  include_market_price_in_prompt: false

  # How many markets to assess concurrently per scan cycle.
  max_concurrent_assessments: 4
  # Retry on rate limits / transient API errors, with exponential backoff.
  max_retries: 3
  retry_base_delay_seconds: 2.0

news:
  # GDELT's public document API has strict burst rate limits (429s under
  # concurrent assessment). Disabled by default — Claude's own knowledge is the
  # primary signal. Enable only if you add throttling or a keyed news source.
  enabled: false
  provider: "gdelt"
  max_articles: 5
  timeout_seconds: 20
  language: "english"

telegram:
  # Bot token from @BotFather
  bot_token: "YOUR_TELEGRAM_BOT_TOKEN_HERE"

  # Your Telegram user ID (get from @userinfobot)
  chat_id: "YOUR_CHAT_ID_HERE"

  # Send alerts for these events
  alert_on:
    - trade_executed
    - edge_detected
    - position_closed
    - daily_pnl
    - error

risk:
  # Starting capital in USDC
  starting_capital: 130.0  # ~100 GBP

  # Maximum % of capital per single position
  max_position_pct: 10.0

  # Maximum number of concurrent open positions
  max_positions: 10

  # Minimum edge (%) to trigger a trade
  # Edge = |AI_probability - market_price|
  min_edge: 5.0

  # Worst-price buffer for market orders, in basis points (150 = 1.5%)
  market_order_slippage_bps: 150

  # ── Position sizing ──
  # Use confidence/spread-aware fractional Kelly sizing. If false, falls back
  # to a flat size = max_position_pct scaled by the model's confidence.
  use_kelly_sizing: true
  # Fraction of full Kelly to bet (0.25 = quarter Kelly, conservative).
  kelly_fraction: 0.25
  # Fallback spread (%) used for sizing when a live spread fetch fails.
  default_spread_pct: 2.0

  # ── Exit rules ──
  # Close a position when unrealised loss exceeds this % of cost.
  stop_loss_pct: 50.0
  # Close a position when unrealised gain exceeds this % of cost.
  take_profit_pct: 50.0
  # Close when the remaining edge for our side falls below this % (price has
  # caught up to the AI's fair value, so the thesis is gone).
  edge_exit_threshold_pct: 2.0
  # Close any position within this many hours of market expiry/resolution.
  exit_hours_before_expiry: 1.0
  # Toggles for each exit rule.
  enable_stop_loss: true
  enable_take_profit: true
  enable_edge_exit: true
  enable_expiry_exit: true

  # Daily loss limit (% of capital)
  daily_loss_limit_pct: 15.0

  # Circuit breaker: pause trading after N consecutive losses
  consecutive_loss_limit: 5

  # Don't trade markets expiring within this many hours
  min_hours_to_expiry: 2

  # Minimum market liquidity in USDC to consider
  min_liquidity: 5000.0

  # Minimum 24h volume to consider
  min_volume_24h: 1000.0

scanner:
  # How often to scan for opportunities (seconds)
  scan_interval: 300  # 5 minutes

  # Maximum markets to assess per scan cycle
  max_markets_per_scan: 20

  # Market categories to include (empty = all)
  # Options: politics, crypto, sports, entertainment, science, business, world
  include_categories: []

  # Market categories to exclude
  exclude_categories: []

logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  file: "logs/oracle.log"
  max_size_mb: 50
  backup_count: 5

# ─────────────────────────────────────────────────────────────────────
# BETFAIR EXCHANGE (UK-legal pivot — validate on the free DELAYED app key)
# ─────────────────────────────────────────────────────────────────────
betfair:
  # From the Betfair API demo tool (createDeveloperAppKeys / getDeveloperAppKeys).
  # Use the DELAYED key (version 1.0-Delay) for validation. Live key needs the
  # £499 activation and is only worth it once paper results prove out.
  app_key: "YOUR_BETFAIR_DELAYED_APP_KEY"
  username: "YOUR_BETFAIR_USERNAME"
  password: "YOUR_BETFAIR_PASSWORD"
  locale: "en"
  currency: "GBP"

# Betfair scanner scope (overrides the Polymarket scanner block above when
# running the Betfair path). All sports + politics, pre-event by default.
betfair_scanner:
  event_type_ids: []          # empty = ALL event types incl. politics; e.g. [1, 2378961] = Soccer + Politics
  market_type_codes: []       # empty = ALL market types (keeps politics/specials, not just MATCH_ODDS)
  in_play_enabled: false      # exclude in-play entirely (slow loop can't compete live)
  max_markets_per_scan: 20
  catalogue_fetch: 200
  book_batch_size: 10         # markets per listMarketBook call (Betfair weight cap)
  min_total_matched: 1000.0   # £ matched liquidity floor
  min_overround: 0.85         # OVERROUND SANITY: drop markets below this (not a real win-market)
  max_overround: 1.20         # ...or above this (handicaps/lines/totals, ultra-thin specials)
  max_hours_ahead: 168.0      # catalogue look-ahead floor (resolution horizon may widen it)
  min_hours_ahead: 3.0        # PRE-EVENT BUFFER: skip anything starting within 3h (avoids near-live state)
  max_resolution_days: 30.0   # RESOLUTION HORIZON: skip markets resolving >30d out (unvalidatable in-window, e.g. 2028/29 politics)
  commission_rate: 0.05       # your Betfair commission rate (market base rate)

# Paper-trading orchestrator (Betfair validation instrument)
paper:
  store_path: "data/paper_bets.jsonl"
  governor_state_path: "data/governor.json"
  passive_timeout_seconds: 1800   # resting in-play limit orders expire after this
  max_bets_per_cycle: 5
  # Cost governor
  daily_deep_assessment_budget: 50   # hard cap on web-search assessments/day (~$10/day)
  reassess_after_hours: 6.0          # re-assess a cached market only after this long
  reassess_on_move: 0.05             # ...or if odds moved >= 5% on a runner
  scan_interval: 1800                # 30-min cycle (pre-event markets move slowly)

# Per-runner assessment edge threshold for Betfair
betfair_assessor:
  min_edge: 0.05                  # actionable edge after deep assessment
  normalise_probabilities: false
  max_runners_per_market: 8
  # Two-stage cost control: cheap triage model + expensive deep model w/ web search
  triage_model: "claude-haiku-4-5-20251001"
  deep_model: "claude-sonnet-4-6"
  triage_edge: 0.04               # promote to deep web-search assess if rough edge >= this
  max_triage_edge: 0.40           # ...but treat edges above this as triage CONFUSION (near-certain market), skip
  min_odds: 1.20                  # don't bet near-locks (odds below this)
  max_odds: 21.0                  # ...or extreme longshots (odds above this)
  web_search_max_uses: 3          # max web searches per deep assessment
  deep_max_tokens: 4000           # bigger budget so search narration + JSON both fit
